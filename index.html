    <style>
:root {
  color-scheme: light;
  --ink: #171514;
  --ink-soft: #342f2d;
  --muted: #817a73;
  --paper: #f8f6f1;
  --surface: #ffffff;
  --surface-soft: #fdfbf7;
  --line: #e7e1d8;
  --line-strong: #d5cbbf;
  --sidebar: #1d1a1c;
  --sidebar-soft: #292427;
  --accent: #b65d68;
  --accent-hover: #974a55;
  --accent-soft: #fbf0f1;
  --success: #667f76;
  --success-soft: #f1f7f4;
  --warning: #957044;
  --warning-soft: #fff7ec;
  --shadow-soft: 0 1px 2px rgba(46, 36, 29, 0.035), 0 14px 32px rgba(46, 36, 29, 0.05);
  --mono: "SFMono-Regular", Consolas, "Liberation Mono", "Courier New", monospace;
  --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  min-width: 320px;
  background: var(--paper);
  text-rendering: optimizeLegibility;
}

body {
  margin: 0;
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(248, 246, 241, 0)) 0 0 / 100% 360px no-repeat,
    var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  letter-spacing: 0;
}

.landing-page {
  min-height: 100vh;
  background: #141112;
  color: white;
}

.landing-hero {
  position: relative;
  display: grid;
  min-height: 82svh;
  overflow: hidden;
  isolation: isolate;
  padding: 28px clamp(18px, 4vw, 58px) 72px;
}

.landing-hero-image,
.landing-shade {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}

.landing-hero-image {
  z-index: -2;
  object-fit: cover;
  object-position: center;
  filter: saturate(0.9) contrast(0.96);
}

.landing-shade {
  z-index: -1;
  background:
    linear-gradient(90deg, rgba(20, 17, 18, 0.92) 0%, rgba(20, 17, 18, 0.78) 30%, rgba(20, 17, 18, 0.34) 70%, rgba(20, 17, 18, 0.2) 100%),
    linear-gradient(180deg, rgba(20, 17, 18, 0.2) 0%, rgba(20, 17, 18, 0.08) 48%, rgba(20, 17, 18, 0.9) 100%);
}

.landing-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  align-self: start;
}

.landing-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  color: rgba(255, 253, 248, 0.94);
  font-size: 13px;
  font-weight: 760;
  letter-spacing: 0.09em;
}

.landing-nav-button,
.landing-secondary {
  border-color: rgba(255, 255, 255, 0.22);
  background: rgba(255, 255, 255, 0.08);
  color: rgba(255, 253, 248, 0.94);
  font-weight: 700;
}

.landing-nav-button:hover,
.landing-secondary:hover {
  border-color: rgba(255, 255, 255, 0.36);
  background: rgba(255, 255, 255, 0.13);
}

.landing-copy {
  width: min(880px, 100%);
  align-self: end;
  padding-bottom: clamp(10px, 5vh, 64px);
}

.landing-kicker {
  margin: 0 0 15px;
  color: rgba(255, 253, 248, 0.68);
  font-size: 12px;
  font-weight: 760;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}

.landing-copy h1 {
  max-width: 860px;
  margin: 0;
  color: #fffdf8;
  font-size: clamp(48px, 6.5vw, 88px);
  font-weight: 760;
  line-height: 0.94;
}

.landing-lede {
  max-width: 680px;
  margin: 24px 0 0;
  color: rgba(255, 253, 248, 0.78);
  font-size: clamp(18px, 2.1vw, 25px);
  line-height: 1.38;
}

.landing-hero-points {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 24px;
}

.landing-hero-points span {
  min-height: 30px;
  display: inline-flex;
  align-items: center;
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 999px;
  padding: 0 11px;
  background: rgba(255, 255, 255, 0.07);
  color: rgba(255, 253, 248, 0.82);
  font-size: 12px;
  font-weight: 720;
}

.landing-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 11px;
  margin-top: 32px;
}

.landing-primary {
  min-height: 46px;
  background: #fffaf1;
  color: #1d1a1c;
  font-weight: 760;
}

.landing-primary:hover {
  background: white;
}

.landing-edge {
  display: grid;
  grid-template-columns: minmax(280px, 0.85fr) minmax(0, 1.25fr);
  gap: clamp(22px, 4vw, 58px);
  padding: clamp(34px, 5vw, 72px) clamp(18px, 4vw, 58px);
  background:
    radial-gradient(circle at 20% 20%, rgba(182, 93, 104, 0.1), transparent 30%),
    linear-gradient(135deg, #fffaf1 0%, #f5efe8 54%, #edf1f0 100%);
  color: var(--ink);
}

.landing-edge-copy {
  align-self: center;
}

.landing-edge-copy span,
.edge-card span {
  display: block;
  margin-bottom: 12px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 760;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.landing-edge-copy h2 {
  max-width: 720px;
  margin: 0;
  font-size: clamp(36px, 5.2vw, 72px);
  font-weight: 740;
  line-height: 0.96;
}

.landing-edge-copy p {
  max-width: 640px;
  margin: 24px 0 0;
  color: var(--ink-soft);
  font-size: clamp(17px, 1.45vw, 22px);
  line-height: 1.48;
}

.edge-card-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.edge-card {
  min-height: 220px;
  border: 1px solid rgba(52, 47, 45, 0.1);
  border-radius: 8px;
  padding: 18px;
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.5)),
    linear-gradient(180deg, rgba(182, 93, 104, 0.06), rgba(102, 127, 118, 0.05));
}

.edge-card p {
  margin: 0;
  color: var(--ink);
  font-size: clamp(17px, 1.35vw, 21px);
  font-weight: 680;
  line-height: 1.35;
}

.landing-conversion {
  display: grid;
  grid-template-columns: minmax(280px, 0.88fr) minmax(0, 1.3fr);
  gap: clamp(22px, 4vw, 58px);
  padding: clamp(34px, 5vw, 72px) clamp(18px, 4vw, 58px);
  background:
    radial-gradient(circle at 78% 8%, rgba(182, 93, 104, 0.11), transparent 34%),
    linear-gradient(135deg, #fbf7ef 0%, #f3ece6 52%, #edf1f0 100%);
  color: var(--ink);
}

.landing-conversion-copy {
  align-self: center;
}

.landing-conversion-copy span,
.landing-draft-header span {
  display: block;
  margin-bottom: 12px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 760;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.landing-conversion-copy h2 {
  max-width: 620px;
  margin: 0;
  font-size: clamp(34px, 4.8vw, 64px);
  font-weight: 740;
  line-height: 0.98;
}

.landing-conversion-copy p {
  max-width: 610px;
  margin: 22px 0 0;
  color: var(--ink-soft);
  font-size: clamp(16px, 1.35vw, 20px);
  line-height: 1.5;
}

.landing-comparison {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
  align-self: center;
}

.landing-draft {
  min-height: 430px;
  display: grid;
  grid-template-rows: auto 1fr;
  border: 1px solid rgba(52, 47, 45, 0.11);
  border-radius: 8px;
  overflow: hidden;
  background: rgba(255, 255, 255, 0.72);
}

.landing-draft-before {
  opacity: 0.78;
}

.landing-draft-after {
  border-color: rgba(182, 93, 104, 0.26);
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.84), rgba(255, 255, 255, 0.62)),
    linear-gradient(180deg, rgba(182, 93, 104, 0.08), rgba(102, 127, 118, 0.05));
  box-shadow: 0 18px 44px rgba(46, 36, 29, 0.08);
}

.landing-draft-header {
  border-bottom: 1px solid rgba(52, 47, 45, 0.1);
  padding: 15px 16px;
}

.landing-draft-header strong {
  display: block;
  font-size: 17px;
  line-height: 1.2;
}

.landing-draft pre {
  margin: 0;
  padding: 18px 16px;
  color: var(--ink);
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.65;
  white-space: pre-wrap;
}

.landing-pipeline {
  padding: clamp(34px, 5vw, 76px) clamp(18px, 4vw, 58px);
  background:
    radial-gradient(circle at 12% 0%, rgba(102, 127, 118, 0.12), transparent 28%),
    linear-gradient(145deg, #191516 0%, #24201f 50%, #2a2524 100%);
  color: #fffaf1;
}

.landing-pipeline-head {
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(280px, 0.8fr);
  gap: clamp(18px, 4vw, 54px);
  align-items: start;
  margin-bottom: clamp(24px, 4vw, 48px);
}

.landing-pipeline-head span,
.landing-value span {
  display: block;
  margin-bottom: 12px;
  color: rgba(255, 250, 241, 0.62);
  font-size: 11px;
  font-weight: 760;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.landing-pipeline-head h2 {
  max-width: 740px;
  margin: 0;
  font-size: clamp(34px, 5vw, 64px);
  font-weight: 740;
  line-height: 0.98;
}

.landing-pipeline-head p {
  max-width: 520px;
  margin: 0;
  color: rgba(255, 250, 241, 0.72);
  font-size: clamp(17px, 1.5vw, 22px);
  line-height: 1.45;
}

.pipeline-rail {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 10px;
}

.pipeline-step {
  min-height: 192px;
  border: 1px solid rgba(255, 250, 241, 0.13);
  border-radius: 8px;
  padding: 16px;
  background:
    linear-gradient(145deg, rgba(255, 250, 241, 0.09), rgba(255, 250, 241, 0.04)),
    linear-gradient(180deg, rgba(182, 93, 104, 0.08), rgba(102, 127, 118, 0.06));
}

.pipeline-step span {
  display: block;
  margin-bottom: 28px;
  color: rgba(255, 250, 241, 0.44);
  font-size: 12px;
  font-weight: 760;
  letter-spacing: 0.08em;
}

.pipeline-step h3 {
  margin: 0;
  font-size: 20px;
}

.pipeline-step p {
  margin: 12px 0 0;
  color: rgba(255, 250, 241, 0.68);
  line-height: 1.42;
}

.landing-value {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 1px;
  background: rgba(52, 47, 45, 0.12);
}

.landing-value article {
  min-height: 410px;
  padding: clamp(28px, 5vw, 70px) clamp(18px, 4vw, 58px);
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.84), rgba(255, 255, 255, 0.48)),
    linear-gradient(180deg, #f8f6f1, #ede9e3);
  color: var(--ink);
}

.landing-value article:last-child {
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.76), rgba(255, 255, 255, 0.46)),
    linear-gradient(180deg, #f5efea, #e9eff0);
}

.landing-value span {
  color: var(--muted);
}

.landing-value h2 {
  max-width: 720px;
  margin: 0;
  font-size: clamp(32px, 4.7vw, 64px);
  font-weight: 740;
  line-height: 0.98;
}

.landing-value p {
  max-width: 650px;
  margin: 24px 0 0;
  color: var(--ink-soft);
  font-size: clamp(17px, 1.5vw, 22px);
  line-height: 1.46;
}

.landing-proof {
  display: grid;
  grid-template-columns: minmax(240px, 0.75fr) minmax(0, 1.65fr);
  gap: clamp(18px, 4vw, 54px);
  padding: clamp(28px, 4.2vw, 58px) clamp(18px, 4vw, 58px);
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  background:
    linear-gradient(135deg, #f8f6f1 0%, #f3ece6 38%, #ece7e3 68%, #e7edf0 100%);
  color: var(--ink);
}

.landing-proof-head {
  align-self: start;
  position: sticky;
  top: 28px;
}

.landing-proof-head span,
.landing-feature span {
  display: block;
  margin-bottom: 11px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 760;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.landing-proof-head strong {
  display: block;
  max-width: 420px;
  font-size: clamp(30px, 4.2vw, 58px);
  font-weight: 740;
  line-height: 0.98;
}

.landing-feature-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.landing-feature {
  min-height: 166px;
  border: 1px solid rgba(52, 47, 45, 0.1);
  border-radius: 8px;
  padding: 18px;
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.38)),
    linear-gradient(180deg, rgba(255, 255, 255, 0.34), rgba(182, 93, 104, 0.05));
}

.landing-feature:nth-child(2n) {
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.34)),
    linear-gradient(180deg, rgba(255, 255, 255, 0.32), rgba(102, 127, 118, 0.06));
}

.landing-feature p {
  margin: 0;
  color: var(--ink-soft);
  font-size: 15px;
  font-weight: 650;
  line-height: 1.35;
}

button,
input,
textarea,
select {
  font: inherit;
}

button {
  min-height: 40px;
  border: 1px solid transparent;
  border-radius: 6px;
  padding: 0 14px;
  line-height: 1.15;
  cursor: pointer;
  transition: background-color 140ms ease, border-color 140ms ease, color 140ms ease, transform 140ms ease;
}

button:hover:not(:disabled) {
  transform: translateY(-1px);
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.46;
}

button.is-locked {
  border-color: rgba(149, 112, 68, 0.26);
  background:
    linear-gradient(180deg, rgba(255, 247, 236, 0.78), rgba(255, 255, 255, 0.9));
  color: var(--warning);
}

button:focus-visible,
input:focus-visible,
textarea:focus-visible,
select:focus-visible {
  outline: 2px solid rgba(200, 50, 74, 0.32);
  outline-offset: 2px;
}

textarea,
input,
select {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: var(--surface);
  color: var(--ink);
  box-shadow: none;
}

input,
select {
  min-height: 42px;
  padding: 0 12px;
}

textarea {
  min-height: 156px;
  padding: 13px 14px;
  resize: vertical;
  line-height: 1.55;
}

.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  clip-path: inset(50%);
  white-space: nowrap;
}

input:hover,
textarea:hover,
select:hover {
  border-color: var(--line-strong);
}

dialog {
  width: min(620px, calc(100vw - 28px));
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0;
  color: var(--ink);
  box-shadow: var(--shadow-soft);
}

dialog::backdrop {
  background: rgba(18, 18, 22, 0.42);
}

dialog.login-dialog {
  width: min(520px, calc(100vw - 28px));
  border-color: rgba(255, 255, 255, 0.18);
  background: rgba(253, 251, 247, 0.96);
  box-shadow: 0 24px 72px rgba(20, 17, 18, 0.24);
}

dialog.paywall-dialog {
  width: min(560px, calc(100vw - 28px));
  border-color: rgba(182, 93, 104, 0.22);
  background: rgba(253, 251, 247, 0.98);
  box-shadow: 0 24px 72px rgba(20, 17, 18, 0.26);
}

.login-dialog::backdrop {
  background:
    radial-gradient(circle at 50% 20%, rgba(182, 93, 104, 0.18), transparent 34%),
    rgba(18, 18, 22, 0.62);
  backdrop-filter: blur(10px);
}

.paywall-dialog::backdrop {
  background:
    radial-gradient(circle at 50% 18%, rgba(182, 93, 104, 0.2), transparent 35%),
    rgba(18, 18, 22, 0.64);
  backdrop-filter: blur(10px);
}

.login-panel {
  display: grid;
  gap: 18px;
  padding: clamp(24px, 4vw, 36px);
}

.paywall-panel {
  display: grid;
  gap: 18px;
  padding: clamp(24px, 4vw, 38px);
}

.login-kicker {
  color: var(--muted);
  font-size: 11px;
  font-weight: 760;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.paywall-kicker {
  color: var(--accent);
  font-size: 11px;
  font-weight: 780;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.login-panel h2 {
  max-width: 430px;
  margin: 0;
  font-size: clamp(30px, 5vw, 44px);
  font-weight: 750;
  line-height: 0.98;
}

.paywall-panel h2 {
  max-width: 460px;
  margin: 10px 0 0;
  font-size: clamp(31px, 5vw, 48px);
  font-weight: 750;
  line-height: 0.98;
}

.login-panel p {
  max-width: 430px;
  margin: 0;
  color: var(--ink-soft);
  font-size: 16px;
  line-height: 1.48;
}

.paywall-panel p {
  max-width: 460px;
  margin: 16px 0 0;
  color: var(--ink-soft);
  font-size: 16px;
  line-height: 1.48;
}

.price-lockup {
  display: grid;
  gap: 4px;
  border: 1px solid rgba(182, 93, 104, 0.18);
  border-radius: 8px;
  padding: 15px 16px;
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.52)),
    var(--accent-soft);
}

.price-lockup strong {
  font-size: 30px;
  line-height: 1;
}

.price-lockup span,
.paywall-feature-list span {
  color: var(--ink-soft);
  font-size: 14px;
  font-weight: 660;
}

.paywall-feature-list {
  display: grid;
  gap: 9px;
}

.paywall-feature-list span {
  min-height: 34px;
  display: flex;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px 10px;
  background: var(--surface);
}

.paywall-actions {
  display: grid;
  gap: 9px;
}

.login-options {
  display: grid;
  gap: 10px;
  margin-top: 4px;
}

.google-login-button {
  min-height: 52px;
  justify-content: center;
  display: inline-flex;
  align-items: center;
  gap: 12px;
  border-color: var(--line-strong);
  background: var(--surface);
  color: var(--ink);
  font-weight: 740;
}

.google-login-button:hover {
  border-color: #c9bdb0;
  background: #fffaf1;
}

.google-mark {
  display: inline-grid;
  width: 25px;
  height: 25px;
  place-items: center;
  border: 1px solid var(--line);
  border-radius: 50%;
  background: conic-gradient(from -42deg, #4285f4 0 25%, #34a853 0 50%, #fbbc05 0 75%, #ea4335 0);
  color: white;
  font-size: 15px;
  font-weight: 800;
}

.login-dismiss {
  justify-self: center;
  min-height: 34px;
}

.app-shell {
  display: grid;
  min-height: 100vh;
  grid-template-columns: 276px minmax(0, 1fr);
}

.sidebar {
  display: flex;
  min-height: 100vh;
  flex-direction: column;
  gap: 24px;
  padding: 24px 20px;
  background: var(--sidebar);
  color: #f8f7f2;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  min-height: 44px;
}

.brand-mark {
  width: 34px;
  height: 34px;
  flex: 0 0 auto;
}

.brand-word {
  font-size: 13px;
  font-weight: 760;
  line-height: 1;
  letter-spacing: 0.08em;
}

.brand-tagline {
  margin-top: 6px;
  color: rgba(248, 247, 242, 0.66);
  font-size: 12px;
}

.sidebar-actions {
  display: grid;
  gap: 9px;
}

.button-primary {
  background: var(--accent);
  color: white;
  font-weight: 720;
}

.button-primary:hover {
  background: var(--accent-hover);
}

.button-secondary {
  border-color: var(--line);
  background: var(--surface);
  color: var(--ink);
  font-weight: 680;
}

.button-secondary:hover {
  border-color: var(--line-strong);
  background: var(--surface-soft);
}

.button-dark {
  border-color: rgba(255, 255, 255, 0.13);
  background: var(--sidebar-soft);
  color: white;
  font-weight: 680;
}

.button-dark:hover {
  border-color: rgba(255, 255, 255, 0.22);
  background: #23232c;
}

.button-ghost {
  background: transparent;
  color: var(--ink-soft);
}

.button-ghost:hover {
  background: rgba(18, 18, 22, 0.04);
}

.project-list {
  display: grid;
  gap: 8px;
  overflow: auto;
  padding-right: 2px;
}

.sidebar-label {
  margin: 0 0 9px;
  color: rgba(248, 247, 242, 0.58);
  font-size: 11px;
  font-weight: 760;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.project-button {
  width: 100%;
  min-height: 68px;
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 11px 12px;
  background: transparent;
  color: white;
  text-align: left;
}

.project-button:hover,
.project-button.is-active {
  border-color: rgba(255, 255, 255, 0.2);
  background: rgba(255, 255, 255, 0.055);
}

.project-button.is-active {
  border-left-color: var(--accent);
  border-left-width: 3px;
}

.project-button strong {
  display: block;
  overflow: hidden;
  margin-bottom: 7px;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-size: 14px;
  font-weight: 720;
}

.project-button span {
  color: rgba(248, 247, 242, 0.68);
  font-size: 12px;
}

.sidebar-footer {
  margin-top: auto;
  display: grid;
  gap: 9px;
  color: rgba(248, 247, 242, 0.7);
  font-size: 12px;
}

.plan-card {
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 8px;
  padding: 14px;
  background: rgba(255, 255, 255, 0.04);
}

.plan-card .plan-label {
  color: rgba(248, 247, 242, 0.56);
  font-size: 10px;
  font-weight: 780;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.plan-card strong {
  color: #fffdf8;
  font-size: 20px;
  line-height: 1.1;
}

.plan-card p {
  margin: 0;
  line-height: 1.42;
}

.role-select {
  border-color: rgba(255, 255, 255, 0.14);
  background: var(--sidebar);
  color: white;
}

.workspace {
  display: grid;
  min-width: 0;
  grid-template-rows: auto 1fr;
}

.topbar {
  display: grid;
  gap: 19px;
  padding: 24px 32px 18px;
  border-bottom: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.64);
}

.project-kicker {
  margin: 0 0 8px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 760;
  letter-spacing: 0.11em;
  text-transform: uppercase;
}

.topbar-main {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 18px;
}

.topbar h1 {
  margin: 0;
  font-size: clamp(30px, 3vw, 42px);
  font-weight: 760;
  line-height: 1.02;
}

.project-meta {
  margin: 10px 0 0;
  color: var(--muted);
  line-height: 1.45;
}

.status-cluster {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 8px;
}

.status-pill {
  min-height: 30px;
  display: inline-flex;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 0 11px;
  background: rgba(255, 255, 255, 0.68);
  color: var(--muted);
  font-size: 11px;
  font-weight: 760;
  white-space: nowrap;
}

.status-pill.is-admin,
.status-pill.is-subscriber {
  border-color: rgba(200, 50, 74, 0.24);
  background: var(--accent-soft);
  color: var(--accent);
}

.progress {
  display: grid;
  grid-template-columns: repeat(6, minmax(88px, 1fr));
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: thin;
}

.stage-button {
  min-height: 56px;
  border-color: var(--line);
  padding: 9px 10px;
  background: rgba(255, 255, 255, 0.62);
  color: var(--muted);
  text-align: left;
}

.stage-button:hover {
  border-color: var(--line-strong);
  background: var(--surface);
}

.stage-button.is-current {
  border-color: rgba(200, 50, 74, 0.7);
  background: var(--surface);
  color: var(--ink);
}

.stage-button.is-complete {
  border-color: rgba(36, 114, 103, 0.22);
  background: var(--success-soft);
  color: var(--success);
}

.stage-button span {
  display: block;
  overflow-wrap: anywhere;
  font-size: 12px;
  font-weight: 760;
}

.stage-button small {
  display: block;
  margin-top: 4px;
  font-size: 11px;
}

.content-grid {
  display: grid;
  min-width: 0;
  grid-template-columns: minmax(0, 1fr) 324px;
  gap: 24px;
  padding: 24px 32px 34px;
}

.main-panel,
.side-panel,
.modal-panel {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.82);
}

.main-panel,
.side-panel {
  min-width: 0;
  padding: 22px;
}

.main-panel {
  box-shadow: var(--shadow-soft);
}

.side-panel {
  align-self: start;
  position: sticky;
  top: 20px;
}

.section-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 18px;
  margin-bottom: 19px;
}

.section-head h2,
.side-panel h2,
.modal-panel h2 {
  margin: 0;
  font-size: 21px;
  font-weight: 740;
  line-height: 1.2;
}

.section-head p,
.muted,
.field-hint {
  color: var(--muted);
}

.section-head p {
  max-width: 760px;
  margin: 8px 0 0;
  line-height: 1.5;
}

.script-head-actions {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 9px;
}

.field-grid {
  display: grid;
  gap: 16px;
}

.field-row {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}

.field label {
  display: block;
  margin-bottom: 8px;
  color: var(--ink-soft);
  font-size: 11px;
  font-weight: 760;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.field-hint {
  margin-top: 7px;
  font-size: 12px;
}

.action-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  margin-top: 16px;
}

.idea-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
  margin-top: 20px;
}

.idea-card,
.metric-card,
.breakdown-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--surface);
}

.idea-card {
  content-visibility: auto;
  contain-intrinsic-size: 220px;
}

.idea-card {
  display: grid;
  min-height: 236px;
  grid-template-rows: auto 1fr auto;
  gap: 14px;
  padding: 16px;
}

.idea-card:hover,
.breakdown-card:hover,
.metric-card:hover {
  border-color: var(--line-strong);
}

.idea-card h3,
.breakdown-card h3 {
  margin: 0;
  font-size: 15px;
  font-weight: 740;
}

.idea-card p {
  margin: 0;
  color: var(--ink-soft);
  line-height: 1.5;
}

.tag-row {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.tag {
  display: inline-flex;
  min-height: 25px;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 0 9px;
  background: var(--surface-soft);
  color: var(--ink-soft);
  font-size: 11px;
  font-weight: 720;
}

.editor {
  min-height: 480px;
  background: #fffefb;
  font-family: var(--mono);
  font-size: 14px;
  line-height: 1.6;
}

.script-editor {
  min-height: 620px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
  margin: 16px 0;
}

.selection-tools {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 9px;
  margin: 0 0 16px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(253, 251, 247, 0.62)),
    linear-gradient(90deg, rgba(182, 93, 104, 0.06), rgba(102, 127, 118, 0.05));
}

.selection-tools span {
  margin-left: auto;
  color: var(--muted);
  font-size: 12px;
}

.metric-card {
  min-height: 86px;
  padding: 14px;
}

.metric-card strong {
  display: block;
  font-size: 26px;
  font-weight: 720;
}

.metric-card span {
  color: var(--muted);
  font-size: 11px;
  font-weight: 760;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.breakdown-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}

.breakdown-band,
.workflow-panel {
  display: grid;
  grid-template-columns: minmax(220px, 0.7fr) minmax(0, 1.3fr);
  gap: 16px;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 16px;
  background:
    linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(253, 251, 247, 0.62)),
    linear-gradient(90deg, rgba(182, 93, 104, 0.06), rgba(102, 127, 118, 0.05));
}

.breakdown-band {
  margin-bottom: 14px;
}

.breakdown-band span,
.workflow-panel span,
.scene-kit-head span,
.asset-head span,
.asset-field span,
.scene-language-field span {
  display: block;
  margin-bottom: 7px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 760;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.breakdown-band strong,
.workflow-panel h3 {
  display: block;
  margin: 0;
  font-size: 20px;
  line-height: 1.2;
}

.breakdown-band p {
  margin: 0;
  color: var(--ink-soft);
  line-height: 1.48;
}

.breakdown-card {
  min-height: 170px;
  padding: 16px;
}

.breakdown-card ul {
  margin: 12px 0 0;
  padding-left: 19px;
  color: var(--ink-soft);
  line-height: 1.55;
}

.workflow-panel {
  margin-top: 18px;
}

.workflow-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}

.workflow-field span {
  display: block;
  margin-bottom: 7px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 760;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.production-kit {
  margin-top: 24px;
}

.scene-kit {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 18px;
  background: var(--surface);
}

.scene-kit + .scene-kit {
  margin-top: 18px;
}

.scene-kit-summary {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 18px;
  cursor: pointer;
  list-style: none;
}

.scene-kit-summary::-webkit-details-marker {
  display: none;
}

.scene-kit-summary::after {
  content: "Open";
  min-height: 32px;
  display: inline-flex;
  align-items: center;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 0 10px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 760;
  text-transform: uppercase;
}

.scene-kit[open] .scene-kit-summary::after {
  content: "Close";
}

.scene-kit-summary h3 {
  margin: 0;
  font-size: 22px;
  line-height: 1.2;
}

.scene-kit-summary p {
  max-width: 760px;
  margin: 8px 0 0;
  color: var(--ink-soft);
  line-height: 1.45;
}

.scene-language-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 18px;
}

.scene-language-field textarea {
  min-height: 110px;
}

.asset-list {
  display: grid;
  gap: 14px;
}

.production-asset {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px;
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.94), rgba(253, 251, 247, 0.62)),
    linear-gradient(180deg, rgba(182, 93, 104, 0.04), rgba(102, 127, 118, 0.04));
}

.asset-head {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  align-items: end;
  margin-bottom: 12px;
}

.asset-order-actions {
  display: flex;
  gap: 8px;
}

.asset-field {
  display: block;
  margin-top: 10px;
}

.asset-field textarea {
  min-height: 94px;
}

.prompt-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
}

.prompt-field textarea {
  min-height: 160px;
  font-family: var(--mono);
  font-size: 13px;
}

.locked-panel {
  border: 1px solid rgba(155, 107, 29, 0.28);
  border-radius: 8px;
  padding: 18px;
  background: var(--warning-soft);
  color: var(--warning);
}

.locked-panel p {
  margin: 8px 0 14px;
}

.side-panel h2 {
  font-size: 18px;
}

.side-block {
  padding: 17px 0;
  border-bottom: 1px solid var(--line);
}

.side-block:last-child {
  border-bottom: 0;
  padding-bottom: 0;
}

.side-block h3 {
  margin: 0 0 11px;
  color: var(--ink-soft);
  font-size: 12px;
  font-weight: 760;
  letter-spacing: 0.09em;
  text-transform: uppercase;
}

.tool-list {
  display: grid;
  gap: 8px;
}

.tool-list button {
  justify-content: flex-start;
  min-height: 42px;
  padding: 10px 12px;
  overflow-wrap: anywhere;
  white-space: normal;
  text-align: left;
}

.note-area {
  min-height: 140px;
}

.modal-panel {
  padding: 22px;
}

.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 20px;
}

.empty-state {
  display: grid;
  min-height: 360px;
  place-items: center;
  padding: 32px;
  text-align: center;
}

.empty-state h1 {
  margin: 0 0 10px;
  font-size: 34px;
  font-weight: 760;
}

.empty-state p {
  max-width: 580px;
  margin: 0 auto 18px;
  color: var(--muted);
}

.toast {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 20;
  max-width: min(420px, calc(100vw - 36px));
  border: 1px solid rgba(255, 255, 255, 0.08);
  border-radius: 8px;
  padding: 13px 15px;
  background: var(--sidebar);
  color: white;
  box-shadow: var(--shadow-soft);
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    scroll-behavior: auto !important;
    transition: none !important;
  }

  button:hover:not(:disabled) {
    transform: none;
  }
}

@media (max-width: 1120px) {
  .landing-edge {
    grid-template-columns: 1fr;
  }

  .landing-conversion {
    grid-template-columns: 1fr;
  }

  .landing-comparison {
    grid-template-columns: 1fr;
  }

  .landing-pipeline-head {
    grid-template-columns: 1fr;
    align-items: start;
  }

  .landing-value {
    grid-template-columns: 1fr;
  }

  .landing-value article {
    min-height: auto;
  }

  .landing-proof {
    grid-template-columns: 1fr;
  }

  .landing-proof-head {
    position: static;
  }

  .landing-feature-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .content-grid {
    grid-template-columns: 1fr;
  }

  .side-panel {
    position: static;
  }

  .idea-grid,
  .breakdown-grid {
    grid-template-columns: 1fr;
  }

  .breakdown-band,
  .workflow-panel,
  .scene-kit-summary {
    grid-template-columns: 1fr;
  }

  .workflow-grid,
  .scene-language-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 780px) {
  .landing-hero {
    min-height: 82svh;
    padding: 24px 16px 56px;
  }

  .landing-nav {
    align-items: flex-start;
  }

  .landing-nav-button {
    display: none;
  }

  .landing-copy {
    padding-bottom: 20px;
  }

  .landing-copy h1 {
    font-size: clamp(38px, 11vw, 48px);
    line-height: 1;
  }

  .landing-lede {
    max-width: 340px;
    margin-top: 18px;
    font-size: 17px;
  }

  .landing-hero-points {
    gap: 6px;
    margin-top: 18px;
  }

  .landing-hero-points span {
    min-height: 28px;
    padding: 0 9px;
    font-size: 11px;
  }

  .landing-actions {
    display: grid;
    margin-top: 24px;
  }

  .landing-proof {
    grid-template-columns: 1fr;
    padding: 28px 16px;
  }

  .landing-conversion {
    padding: 34px 16px;
  }

  .landing-edge {
    padding: 34px 16px;
  }

  .landing-edge-copy h2 {
    font-size: 34px;
  }

  .landing-edge-copy p {
    font-size: 17px;
  }

  .edge-card-grid {
    grid-template-columns: 1fr;
  }

  .edge-card {
    min-height: 150px;
  }

  .landing-conversion-copy h2 {
    font-size: 34px;
  }

  .landing-comparison {
    gap: 10px;
  }

  .landing-pipeline {
    padding: 34px 16px;
  }

  .landing-pipeline-head h2 {
    font-size: 34px;
  }

  .landing-pipeline-head p {
    font-size: 17px;
  }

  .pipeline-rail {
    grid-template-columns: 1fr;
    overflow-x: visible;
  }

  .pipeline-step {
    min-height: 142px;
  }

  .pipeline-step span {
    margin-bottom: 22px;
  }

  .landing-value article {
    padding: 34px 16px;
  }

  .landing-value h2 {
    font-size: 34px;
  }

  .landing-value p {
    font-size: 17px;
  }

  .landing-draft {
    min-height: auto;
  }

  .landing-draft pre {
    font-size: 13px;
  }

  .landing-proof-head strong {
    font-size: 32px;
  }

  .landing-feature-grid {
    grid-template-columns: 1fr;
  }

  .landing-feature {
    min-height: 114px;
  }

  .app-shell {
    grid-template-columns: 1fr;
  }

  .sidebar {
    min-height: auto;
    padding: 24px 22px;
  }

  .topbar-main,
  .section-head {
    display: grid;
  }

  .script-head-actions {
    justify-content: stretch;
  }

  .script-head-actions button,
  .selection-tools button {
    width: 100%;
  }

  .selection-tools {
    display: grid;
  }

  .selection-tools span {
    margin-left: 0;
  }

  .status-cluster {
    justify-content: flex-start;
  }

  .progress {
    grid-template-columns: repeat(6, 116px);
  }

  .content-grid,
  .topbar {
    padding-left: 16px;
    padding-right: 16px;
  }

  .field-row,
  .stats-grid {
    grid-template-columns: 1fr;
  }

  .workflow-grid,
  .scene-language-grid,
  .prompt-grid,
  .asset-head {
    grid-template-columns: 1fr;
  }

  .scene-kit {
    padding: 14px;
  }

  .scene-kit-summary {

    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
const moods = ["quiet dread", "restless wonder", "dry humor", "tender suspense", "uneasy hope"];
const genres = ["Drama", "Sci-Fi", "Thriller", "Fantasy", "Mystery", "Comedy"];
const stakes = [
  "must decide whether the truth is worth the life it will destroy",
  "has one night to repair a mistake nobody else remembers",
  "discovers the solution will cost them the identity they built",
  "is forced to turn a private wound into a public act of courage",
  "must choose between being understood and saving someone who never will",
];

function makeId() {
  if (globalThis.crypto?.randomUUID) {
    return globalThis.crypto.randomUUID();
  }

  return `id-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function pick(list, index) {
  return list[Math.abs(index) % list.length];
}

function cleanInput(value, fallback) {
  const trimmed = String(value || "").trim();
  return trimmed || fallback;
}

function inspirationPhrase(project) {
  if (!project.inspirations.length) {
    return "grounded character drama, precise visual pacing, and an ending image that lingers";
  }

  return project.inspirations.slice(0, 4).join(", ");
}

function titleCase(value) {
  return cleanInput(value, "Untitled").replace(/\w\S*/g, (word) => {
    return word.charAt(0).toUpperCase() + word.slice(1).toLowerCase();
  });
}

function generateIdeaCards(input, project) {
  const seed = cleanInput(input, "a filmmaker searching for a story that refuses to be filmed");
  const titleSeed = titleCase(project.title || seed);

  return [0, 1, 2].map((offset) => {
    const genre = pick(genres, seed.length + offset);
    const tone = pick(moods, titleSeed.length + offset);
    const protagonist = pick(
      ["a night archivist", "a former stunt coordinator", "a teenage sound recordist", "an exhausted location scout", "a failed documentarian"],
      seed.length + project.title.length + offset
    );

    return {
      id: makeId(),
      title: `${titleSeed}: Variation ${offset + 1}`,
      genre,
      tone,
      premise: `${protagonist} follows ${seed.toLowerCase()} into a place where the ordinary rules stop applying. As the evidence starts contradicting memory, the protagonist ${pick(stakes, offset + seed.length)}. The story turns on a small human choice made under impossible pressure.`,
    };
  });
}

function generateSynopsis(project, modifier = "balanced") {
  const idea = cleanInput(project.documents.idea, "A filmmaker follows a mysterious creative lead into dangerous emotional territory.");
  const inspirations = inspirationPhrase(project);
  const tone = cleanInput(project.tone, "controlled and cinematic");
  const genre = cleanInput(project.genre, "drama");

  return `${project.title} is a ${genre.toLowerCase()} about someone trying to make meaning before the world closes in. ${idea}

The story begins with a concrete image: work lights, unfinished rooms, and a protagonist who has learned to survive by keeping feeling out of frame. When a discovery connected to the project forces the past into the present, every practical decision becomes personal. The central conflict is not simply whether the film can be finished, but whether the protagonist can face the truth that made the work necessary in the first place.

The tone is ${tone}, with a ${modifier} emotional register. Inspired by ${inspirations}, the synopsis favors visual behavior over speeches. The stakes tighten as collaborators, locations, and memories stop lining up. By the end, the protagonist must choose between a cleaner fiction and a messier act of honesty that changes the final image forever.`;
}

function generateTreatment(project) {
  const synopsis = cleanInput(project.documents.synopsis, generateSynopsis(project));
  const inspirations = inspirationPhrase(project);
  const logline = `${project.title}: a filmmaker is pulled through a creative mystery that forces a private reckoning before the final shot can be captured.`;

  return `LOGLINE
${logline}

STORY WORLD AND TONE
The film lives in practical spaces: offices after closing, empty stages, half-built sets, parking lots at dawn. The tone is ${cleanInput(project.tone, "controlled, intimate, and tense")}. The visual grammar borrows from ${inspirations}: patient framing, charged silence, and emotional turns expressed through objects, blocking, and light.

CHARACTER INTRODUCTIONS
The protagonist is talented but defended, someone who can organize a production better than a feeling. The closest collaborator knows the pattern and keeps pressing for the truth beneath the work. The antagonist is not purely a person; it is the pressure to turn pain into something marketable before it has become honest.

THREE-ACT STRUCTURE
Act One establishes the project, the creative wound, and the inciting discovery. ${synopsis}

Act Two complicates every answer. The protagonist follows leads, rewrites the plan, and mistakes control for clarity. Midway through, a piece of evidence reframes the whole project. What looked like ambition becomes avoidance.

Act Three strips the production down to one essential choice. The protagonist abandons the safe version, stages the scene differently, and allows the final image to carry both loss and release.

KEY BEATS
Opening image: a quiet workspace arranged with obsessive care.
Inciting incident: a document, recording, or location detail contradicts the official story.
Midpoint: the protagonist realizes the film has been protecting the wrong person.
Dark night: the project collapses because honesty would damage everyone involved.
Final image: the opening composition returns, changed by one brave interruption.

THEMATIC STATEMENT
Art becomes alive when it stops protecting its maker from the truth.`;
}

function generateShortStory(project) {
  const treatment = cleanInput(project.documents.treatment, generateTreatment(project));

  return `The first thing anyone notices is the tape on the floor. Blue strips divide the room into clean angles, marking doors that are not there, windows that have not been built, a table that exists only because everyone has agreed to imagine it.

The protagonist arrives before the crew and checks every mark by hand. This is the easiest part of filmmaking: measuring distance, replacing batteries, labeling drives. The harder part waits in the pages on the desk. The scene is supposed to be simple. Someone walks into a room. Someone else finally tells the truth. The scene refuses to work.

By midmorning the production has become a machine with one missing gear. The actor asks a practical question and receives an answer too quickly. The sound recordist hears something in an old file. The location scout recognizes a hallway from a memory nobody mentioned. Each detail is small enough to ignore, but together they gather weight.

The protagonist keeps moving. Movement is useful. Movement gives fear a job.

Then the evidence appears: not dramatic, not cinematic, just a plain object in the wrong place. A receipt. A photograph. A strip of audio where silence should be. It proves the story has been arranged to protect the person telling it. The protagonist understands this before anyone says it aloud.

The afternoon thins into the kind of light that makes every surface look temporary. The collaborator asks whether they are making a film or hiding inside one. No one else hears the question. That makes it worse.

For a while, the protagonist chooses the safe version. The crew resets. The actor takes the mark. The camera rolls. The line lands cleanly and means nothing.

Cut.

The word hangs in the room longer than it should.

The protagonist crosses the tape, tears up the blocking, and moves the actor to the place nobody wanted to stand. The scene changes shape. It becomes less clever and more dangerous. It no longer explains the wound. It lets the wound behave.

When the camera rolls again, nobody says what they mean. They do not need to. The room carries it. The distance between two chairs carries it. A hand resting on an unfinished wall carries it.

The final shot is almost identical to the first: the same room, the same tape, the same light. Only one mark has moved. It is enough.`;
}

function generateScript(project) {
  const title = project.title.toUpperCase();
  const inspirations = inspirationPhrase(project);

  return `TITLE: ${title}
INSPIRED BY: ${inspirations}

FADE IN:

INT. EMPTY SOUNDSTAGE - MORNING

Blue tape cuts across the floor in clean, practical lines. Doorways
without walls. Windows without glass. A room built from intention.

MARA VALE, 34, measures the same mark for the third time.

Across the stage, JONAH, 36, watches her work.

JONAH
You know tape does not get more accurate
when you intimidate it.

Mara does not look up.

MARA
It gets less ambitious.

Jonah smiles, but the smile fades when he sees the script pages
stacked beside the monitor. Every page is marked in red.

INT. SOUNDSTAGE - LATER

The crew waits in the practiced silence of people paid by the hour.
An actor stands on the blue mark. Mara studies the frame.

SOUND RECORDIST
There is something in the reference track.

Mara turns.

MARA
Something useful?

The sound recordist plays it. Static. Room tone. Then a voice,
barely there.

VOICE (V.O.)
Do not make me the brave one.

Mara goes still.

INT. PRODUCTION OFFICE - AFTERNOON

Old call sheets cover the table. Jonah sets down a faded photograph:
the same stage, years ago, with one mark placed where no mark exists now.

JONAH
You wrote around it.

MARA
I wrote what happened.

JONAH
No. You wrote what let you keep working.

Mara looks through the office window at the unfinished set.

INT. EMPTY SOUNDSTAGE - DUSK

The actor waits. The crew is restless. Mara walks into the set and
pulls up a strip of blue tape.

No one moves.

She places the tape three feet left.

MARA
We start here.

JONAH
That changes the scene.

MARA
Good.

The actor steps onto the new mark. The room feels different now:
less elegant, more alive.

CAMERA OPERATOR
Rolling.

The slate claps.

The actor says nothing. Just rests one hand on an unfinished wall.

Mara watches from behind the monitor. This time, she does not look away.

INT. EMPTY SOUNDSTAGE - NIGHT

The crew has gone. The blue tape remains.

Mara stands in the room made of marks and missing walls. She moves one
last strip of tape by an inch.

It is not enough to fix anything.

It is enough to tell the truth.

FADE OUT.`;
}

function generateBreakdowns(project) {
  const script = cleanInput(project.documents.script, generateScript(project));
  const sceneMatches = script.match(/(?:INT\.|EXT\.)[^\n]+/g) || ["INT. EMPTY SOUNDSTAGE - MORNING"];
  const workflow = project.workflow || {
    imageTool: "Midjourney",
    animationTool: "Runway",
    soundTool: "ElevenLabs",
    editTool: "Premiere Pro",
  };
  const inspiration = inspirationPhrase(project);

  return {
    scenes: sceneMatches.map((heading, index) => ({
      id: makeId(),
      heading,
      summary: index === 0
        ? "The production space and protagonist's need for control are established visually."
        : "A new piece of evidence pressures the story toward honesty.",
      cast: ["Mara Vale", "Jonah"],
      continuity: "Blue floor tape, marked pages, and the old evidence object must remain consistent across coverage.",
    })),
    characters: ["Mara Vale - director trying to control the wound", "Jonah - collaborator who sees the avoidance", "Sound Recordist - discovers the buried clue"],
    locations: ["Empty soundstage", "Production office", "Unfinished set"],
    props: ["Blue floor tape", "Marked script pages", "Old call sheets", "Faded photograph", "Reference audio recorder"],
    shotList: [
      "Wide static frame of blue tape mapping an imaginary room",
      "Close insert on Mara's hand measuring the mark",
      "Over-shoulder monitor shot as the wrong line lands cleanly",
      "Slow push toward the photograph on the production table",
      "Locked-off final frame echoing the opening composition",
    ],
    aiProductionKit: sceneMatches.map((heading, index) => createProductionSceneKit({
      heading,
      index,
      project,
      workflow,
      inspiration,
    })),
  };
}

function createProductionSceneKit({ heading, index, project, workflow, inspiration }) {
  const sceneTone = cleanInput(project.tone, "controlled, grounded, emotionally tense");
  const colorPalette = index === 0
    ? "soft graphite, faded blue tape, warm practical highlights, off-white script pages"
    : "muted charcoal, exhausted tungsten, pale skin tones, restrained red evidence details";

  return {
    id: makeId(),
    heading,
    purpose: index === 0
      ? "Establish the production world, the protagonist's control, and the visual language of unfinished spaces."
      : "Escalate the emotional contradiction by making a small piece of evidence visually unavoidable.",
    colorPalette,
    feel: `${sceneTone}; patient, precise, and visually motivated by ${inspiration}.`,
    blocking: "Keep actors separated by practical production objects. Let distance, marks, and withheld eye contact carry the emotional conflict.",
    consistency: "Maintain the same floor tape geometry, lens height, wardrobe palette, and evidence object placement across image, animation, and edit prompts.",
    wardrobe: "Mara: dark work shirt, practical boots, minimal jewelry. Jonah: muted overshirt, worn crew badge, tired production-day styling.",
    soundDesign: "No music. Room tone, distant ballast hum, cloth movement, paper handling, one small object touch that lands louder than dialogue.",
    words: "Dialogue should stay spare and subtextual. Characters name facts, not feelings.",
    assets: [
      createProductionAsset({
        order: 1,
        type: "Establishing Frame",
        name: "Unfinished production space",
        purpose: "Show the scene world and the production geometry before characters explain anything.",
        visual: "wide static frame of blue floor tape marking invisible walls on an empty soundstage",
        workflow,
        colorPalette,
        sceneTone,
      }),
      createProductionAsset({
        order: 2,
        type: "Character Continuity",
        name: "Mara control pass",
        purpose: "Lock the lead character's look, posture, wardrobe, and emotional mask.",
        visual: "Mara measuring a floor mark by hand, face half-lit, body held too still",
        workflow,
        colorPalette,
        sceneTone,
      }),
      createProductionAsset({
        order: 3,
        type: "Prop Insert",
        name: "Evidence object",
        purpose: "Create the key insert that can motivate a cut, memory, or reveal.",
        visual: "close insert of an old call sheet folded beside marked script pages and blue tape",
        workflow,
        colorPalette,
        sceneTone,
      }),
      createProductionAsset({
        order: 4,
        type: "Sound Cue",
        name: "Room tone clue",
        purpose: "Define the non-musical sound layer that makes the scene feel discovered, not scored.",
        visual: "reference audio recorder on a production table with a tiny red recording light",
        workflow,
        colorPalette,
        sceneTone,
      }),
    ],
  };
}

function createProductionAsset({ order, type, name, purpose, visual, workflow, colorPalette, sceneTone }) {
  const basePrompt = `${visual}. ${colorPalette}. ${sceneTone}. cinematic pre-production still, shallow depth of field, natural production texture, no text, no watermark`;

  return {
    id: makeId(),
    order,
    type,
    name,
    purpose,
    imagePrompt: formatImagePrompt(workflow.imageTool, basePrompt),
    animationPrompt: formatAnimationPrompt(workflow.animationTool, visual, sceneTone),
    soundPrompt: formatSoundPrompt(workflow.soundTool, purpose),
    notes: "Editable. Keep this asset consistent with the scene palette, wardrobe, blocking, and prop continuity.",
  };
}

function createInsertShotAsset(sceneKit, project) {
  const workflow = project.workflow || {
    imageTool: "Midjourney",
    animationTool: "Runway",
    soundTool: "ElevenLabs",
  };
  const order = (sceneKit.assets?.length || 0) + 1;
  const visual = `insert shot for ${sceneKit.heading}: a tactile story object handled in silence, framed close enough to reveal emotional pressure`;

  return createProductionAsset({
    order,
    type: "Insert Shot",
    name: `Insert shot ${order}`,
    purpose: "Add one more precise visual beat that can bridge story, continuity, or emotional reveal.",
    visual,
    workflow,
    colorPalette: sceneKit.colorPalette,
    sceneTone: sceneKit.feel,
  });
}

function formatImagePrompt(tool, basePrompt) {
  if (tool === "Midjourney") {
    return `For Midjourney: ${basePrompt} --ar 16:9 --style raw --v 6`;
  }

  if (tool === "DALL-E") {
    return `For DALL-E: ${basePrompt}. Compose as a clean 16:9 cinematic still with clear production continuity.`;
  }

  if (tool === "Stable Diffusion") {
    return `For Stable Diffusion: ${basePrompt}. Negative prompt: text, watermark, extra fingers, distorted props, inconsistent wardrobe, plastic skin.`;
  }

  return `${basePrompt}. Adapt for ${tool}.`;
}

function formatAnimationPrompt(tool, visual, sceneTone) {
  if (tool === "Runway") {
    return `For Runway: ${visual}. 4 second subtle camera move, slow push or locked-off tension, natural motion only, no music, preserve wardrobe and prop continuity. Tone: ${sceneTone}.`;
  }

  if (tool === "Pika") {
    return `For Pika: ${visual}. Minimal movement, cinematic restraint, no morphing, no scene change, preserve faces, props, clothing, and blocking.`;
  }

  if (tool === "After Effects") {
    return `For After Effects: ${visual}. Plan as layered plate animation: foreground prop hold, slight camera drift, soft practical flicker, no music.`;
  }

  return `${visual}. Adapt animation prompt for ${tool}; keep movement subtle and continuity locked.`;
}

function formatSoundPrompt(tool, purpose) {
  if (tool === "ElevenLabs") {
    return `For ElevenLabs: No music. Create production sound design for: ${purpose}. Use room tone, subtle handling noise, distant electrical hum, and one focused tactile cue.`;
  }

  if (tool === "Adobe Audition") {
    return `For Adobe Audition: Build a no-music sound bed: room tone base, production-space hum, cloth/paper foley, one emphasized object cue. Purpose: ${purpose}.`;
  }

  return `No music. Sound design for ${tool}: room tone, restrained foley, production ambience, and one story-motivated sound cue.`;
}

function countScriptStats(script) {
  const text = cleanInput(script, "");
  const scenes = (text.match(/(?:INT\.|EXT\.)[^\n]+/g) || []).length;
  const words = text.split(/\s+/).filter(Boolean).length;
  const pages = Math.max(1, Math.ceil(words / 250));

  return { scenes, words, pages };
}

const stages = [
  { id: "idea", label: "Idea", doc: "idea" },

];

function escapeHtml(value) {

function createProject(input = {}) {

function createSeedState() {

  };
}

function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
    if (saved?.projects?.length) {
      return ensureStateDefaults(saved);
    }
  } catch (error) {
    console.warn("Could not load saved Studiobuild state.", error);
  }

  return ensureStateDefaults(createSeedState());
}

function ensureStateDefaults(value) {
  const subscription = value.subscription?.status === "active"
    ? value.subscription
    : { status: "free" };

  return {
    auth: value.auth || null,
    subscription,
    role: subscription.status === "active" ? "subscriber" : "free",
    activeProjectId: value.activeProjectId,
    projects: value.projects || [],
  };
}

function writeState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function saveState() {
  if (pendingSaveTimer) {
    clearTimeout(pendingSaveTimer);
    pendingSaveTimer = null;
  }

  writeState();
}

function scheduleSaveState() {
  if (pendingSaveTimer) {
    clearTimeout(pendingSaveTimer);
  }

  pendingSaveTimer = setTimeout(() => {
    pendingSaveTimer = null;
    writeState();
  }, 250);
}

function flushScheduledSave() {
  if (!pendingSaveTimer) {
    return;
  }

  clearTimeout(pendingSaveTimer);
  pendingSaveTimer = null;
  writeState();
}

function parseCommaList(value) {
  return String(value || "")
    .split(",")
    .map((item) => item.trim())
    .filter(Boolean)
    .slice(0, 10);
}

function activeProject() {
  const project = state.projects.find((item) => item.id === state.activeProjectId) || state.projects[0] || null;
  if (project) {
    ensureProjectDefaults(project);
  }

  return project;
}

function ensureProjectDefaults(project) {
  project.workflow = { ...defaultWorkflow(), ...(project.workflow || {}) };

  if (project.breakdowns && !project.breakdowns.aiProductionKit) {
    project.breakdowns = generateBreakdowns(project);
  }
}

function updateActiveProject(updater) {
  const project = activeProject();
  if (!project) {
    return;
  }

  updater(project);
  project.updatedAt = new Date().toISOString();
  saveState();
  render();
}

function hasSubscription() {
  return state.subscription?.status === "active";
}

function planLabel() {
  return hasSubscription() ? "Studio Pass" : "Free";
}

function hasAccess(feature) {
  return !featureGates[feature] || hasSubscription();
}

function openPaywall(feature = "full access") {
  const dialog = document.querySelector("#paywall-dialog");
  const featureText = dialog?.querySelector("[data-paywall-feature]");

  if (featureText) {
    featureText.textContent = featureGates[feature] || feature;
  }

  dialog?.showModal();
}

function requireAccess(feature) {
  if (hasAccess(feature)) {
    return true;
  }

  openPaywall(feature);
  return false;
}

function completedStageIds(project) {
  return stages
    .filter((stage) => {
      if (stage.id === "breakdown") {
        return Boolean(project.breakdowns);
      }

      return Boolean(project.documents[stage.doc]?.trim());
    })
    .map((stage) => stage.id);
}

function canOpenStage(project, stageId) {
  const targetIndex = stages.findIndex((stage) => stage.id === stageId);
  const firstIncompleteIndex = stages.findIndex((stage) => {
    if (stage.id === "breakdown") {
      return !project.breakdowns;
    }

    return !project.documents[stage.doc]?.trim();
  });

  const availableIndex = firstIncompleteIndex === -1 ? stages.length - 1 : firstIncompleteIndex;
  return targetIndex <= availableIndex;
}

function setStage(stageId) {
  updateActiveProject((project) => {
    if (canOpenStage(project, stageId)) {
      project.activeStage = stageId;
    }
  });
}

function stageState(project, stage) {
  if (project.activeStage === stage.id) {
    return "is-current";
  }

  return completedStageIds(project).includes(stage.id) ? "is-complete" : "";
}

function renderTopbar(project) {
  const stats = countScriptStats(project.documents.script);
  const stageButtons = stages
    .map((stage) => `
      <button
        class="stage-button ${stageState(project, stage)}"
        data-action="set-stage"
        data-stage="${stage.id}"
        ${canOpenStage(project, stage.id) ? "" : "disabled"}
      >
        <span>${escapeHtml(stage.label)}</span>
        <small>${completedStageIds(project).includes(stage.id) ? "Complete" : project.activeStage === stage.id ? "Active" : "Locked"}</small>
      </button>
    `)
    .join("");

  return `
    <header class="topbar">
      <div class="topbar-main">
        <div>
          <p class="project-kicker">Current Project</p>
          <h1>${escapeHtml(project.title)}</h1>
          <p class="project-meta">${escapeHtml(project.genre)} / ${escapeHtml(project.tone)}</p>
        </div>
        <div class="status-cluster">
          <span class="status-pill ${hasSubscription() ? "is-subscriber" : ""}">${escapeHtml(planLabel().toUpperCase())}</span>

          <span class="status-pill">${stats.pages} script pages</span>
        </div>
      </div>
      <nav class="progress" aria-label="Pipeline progress">${stageButtons}</nav>
    </header>
  `;
}

function renderStage(project) {
  switch (project.activeStage) {
    case "idea":
      return renderIdeaStage(project);
    case "synopsis":
      return renderDocumentStage(project, {
        title: "Synopsis",
        doc: "synopsis",
        description: "Turn the selected premise into a polished story spine with protagonist, conflict, stakes, and tonal direction.",
        generateLabel: "Generate Synopsis",
      });
    case "treatment":
      return renderDocumentStage(project, {
        title: "Treatment",
        doc: "treatment",
        description: "Expand the synopsis into the core document that defines world, characters, structure, beats, and theme.",
        generateLabel: "Generate Treatment",
      });
    case "story":
      return renderDocumentStage(project, {
        title: "Short Story",
        doc: "story",
        description: "Make the heart pass: flowing present-tense prose before screenplay formatting tightens the material.",
        generateLabel: "Generate Short Story",
      });
    case "script":
      return renderScriptStage(project);
    case "breakdown":
      return renderBreakdownStage(project);
    default:
      return renderIdeaStage(project);
  }
}

function renderIdeaStage(project) {
  const cards = project.ideaCards
    .map((card) => `
      <article class="idea-card">
        <div>
          <div class="tag-row">

        <h2>Idea Generator</h2>

      </div>

    <div class="field-grid">
      <div class="field">
        <label for="idea-input">Raw idea or theme</label>
        <textarea id="idea-input" data-field="ideaInput" placeholder="Example: a sound recordist finds a hidden voice in old room tone">${escapeHtml(project.ideaInput)}</textarea>
        <div class="field-hint">This local MVP uses mock generation; later this button will call a protected backend endpoint.</div>
      </div>
      <div class="action-row">
        <button class="button-primary" data-action="generate-ideas">Generate Ideas</button>

    <div class="idea-grid">${cards}</div>
  `;
}

function renderDocumentStage(project, options) {
  return `

      <div>
        <h2>${escapeHtml(options.title)}</h2>
        <p>${escapeHtml(options.description)}</p>
      </div>
      <button class="button-primary" data-action="generate-doc" data-doc="${options.doc}">${escapeHtml(options.generateLabel)}</button>
    </div>

    <div class="field-grid">
      <div class="field">
        <label for="${options.doc}-editor">${escapeHtml(options.title)} Document</label>

function renderScriptStage(project) {
  const stats = countScriptStats(project.documents.script);

  return `
    <div class="section-head">
      <div>

        <button class="button-primary" data-action="generate-doc" data-doc="script">Generate Script</button>
        <input class="visually-hidden" id="script-import-input" type="file" accept=".txt,.fountain,.fdx" data-script-import />
      </div>
    </div>

    <div class="stats-grid">
      <div class="metric-card"><strong>${stats.scenes}</strong><span>Scenes</span></div>

      <textarea class="editor script-editor" id="script-editor" data-doc-type="script">${escapeHtml(project.documents.script)}</textarea>

    <div class="action-row">
      <button class="button-secondary ${hasAccess("versions") ? "" : "is-locked"}" data-action="save-version" data-doc="script">Save Version</button>
      <button class="button-secondary ${hasAccess("exports") ? "" : "is-locked"}" data-action="export-fountain">Export Fountain</button>
      <button class="button-ghost" data-action="advance-stage">Continue</button>
    </div>
  `;

function renderBreakdownStage(project) {
  if (!hasAccess("breakdowns")) {
    return `
      <div class="section-head">
        <div>
          <h2>Script Breakdowns</h2>
          <p>The free tier lets you build the draft. Studio Pass unlocks the scene-by-scene production system.</p>
        </div>
      </div>
      ${renderLockedFeature(
        "breakdowns",
        "Studio Pass required",
        `Unlock scene breakdowns, production packets, workflow prompts, insert shots, versions, and exports for ${WEEKLY_PRICE}.`
      )}
    `;
  }

  const breakdowns = project.breakdowns || generateBreakdowns(project);
  const sceneItems = breakdowns.scenes
    .map((scene) => `<li><strong>${escapeHtml(scene.heading)}</strong>: ${escapeHtml(scene.summary)}</li>`)
    .join("");

  return `
    <div class="section-head">
      <div>
        <h2>Script Breakdowns</h2>
        <p>Start with the traditional breakdown, then turn each scene into workflow-specific prompts for images, animation, sound, continuity, wardrobe, and insert shots.</p>

      <button class="button-primary" data-action="generate-breakdowns">Generate Breakdowns</button>
    </div>

    <div class="breakdown-band">
      <div>
        <span>Traditional breakdown</span>
        <strong>What does production need?</strong>

      <p>Scene purpose, cast, locations, props, wardrobe, and shot logic stay at the top so the AI production kit never drifts away from real pre-production.</p>

    <div class="breakdown-grid">
      <article class="breakdown-card">

      <article class="breakdown-card">
        <h3>Characters</h3>
        <ul>${breakdowns.characters.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>

      <article class="breakdown-card">
        <h3>Locations</h3>
        <ul>${breakdowns.locations.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>

        <h3>Shot List</h3>
        <ul>${breakdowns.shotList.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>

function renderWorkflowPanel(project) {

    </section>
  `;
}

function renderWorkflowSelect(field, label, value) {
  return `
    <label class="workflow-field">
      <span>${escapeHtml(label)}</span>
      <select data-workflow-field="${field}">
        ${workflowOptions[field].map((option) => `
          <option value="${escapeHtml(option)}" ${option === value ? "selected" : ""}>${escapeHtml(option)}</option>
        `).join("")}
      </select>
    </label>
  `;
}

function renderProductionKit(project, breakdowns) {
  const sceneKits = breakdowns.aiProductionKit || [];

  return `
    <section class="production-kit">
      <div class="section-head">
        <div>
          <h2>AI Production Kit</h2>
          <p>Editable scene language for image generation, animation, sound design, continuity, wardrobe, blocking, and insert shots.</p>

      </div>
      ${sceneKits.map((sceneKit, sceneIndex) => renderSceneKit(project, sceneKit, sceneIndex)).join("")}

}

function renderSceneKit(project, sceneKit, sceneIndex) {
  return `
    <details class="scene-kit" ${sceneIndex === 0 ? "open" : ""}>
      <summary class="scene-kit-summary">
        <div>
          <span>Scene ${sceneIndex + 1}</span>
          <h3>${escapeHtml(sceneKit.heading)}</h3>
          <p>${escapeHtml(sceneKit.purpose)}</p>
        </div>
      </summary>

      <div class="scene-language-grid">
        ${renderSceneLanguageField(sceneIndex, "colorPalette", "Color", sceneKit.colorPalette)}
        ${renderSceneLanguageField(sceneIndex, "feel", "Feel + Tone", sceneKit.feel)}
        ${renderSceneLanguageField(sceneIndex, "blocking", "Blocking", sceneKit.blocking)}
        ${renderSceneLanguageField(sceneIndex, "wardrobe", "Clothing", sceneKit.wardrobe)}
        ${renderSceneLanguageField(sceneIndex, "soundDesign", "Sound Design", sceneKit.soundDesign)}
        ${renderSceneLanguageField(sceneIndex, "consistency", "Consistency", sceneKit.consistency)}
      </div>

      <div class="asset-list">
        ${sceneKit.assets

          .sort((a, b) => a.order - b.order)

      <div class="action-row">
        <button class="button-primary" data-action="add-insert-shot" data-scene-index="${sceneIndex}">I need another insert shot</button>
      </div>
    </details>
  `;
}

function renderSceneLanguageField(sceneIndex, field, label, value) {
  return `
    <label class="scene-language-field">
      <span>${escapeHtml(label)}</span>
      <textarea data-scene-field="${field}" data-scene-index="${sceneIndex}">${escapeHtml(value)}</textarea>
    </label>
  `;
}

function renderProductionAsset(project, sceneIndex, asset, assetIndex, assetCount) {
  return `
    <article class="production-asset">
      <div class="asset-head">
        <div>
          <span>${String(asset.order).padStart(2, "0")} / ${escapeHtml(asset.type)}</span>
          <input data-asset-field="name" data-scene-index="${sceneIndex}" data-asset-id="${asset.id}" value="${escapeHtml(asset.name)}" />
        </div>
        <div class="asset-order-actions">
          <button class="button-secondary" data-action="move-asset-up" data-scene-index="${sceneIndex}" data-asset-id="${asset.id}" ${assetIndex === 0 ? "disabled" : ""}>Up</button>
          <button class="button-secondary" data-action="move-asset-down" data-scene-index="${sceneIndex}" data-asset-id="${asset.id}" ${assetIndex === assetCount - 1 ? "disabled" : ""}>Down</button>
        </div>
      </div>
      <label class="asset-field">
        <span>Purpose</span>
        <textarea data-asset-field="purpose" data-scene-index="${sceneIndex}" data-asset-id="${asset.id}">${escapeHtml(asset.purpose)}</textarea>
      </label>
      <div class="prompt-grid">
        ${renderPromptField("imagePrompt", `${project.workflow.imageTool} image prompt`, sceneIndex, asset)}
        ${renderPromptField("animationPrompt", `${project.workflow.animationTool} animation prompt`, sceneIndex, asset)}
        ${renderPromptField("soundPrompt", `${project.workflow.soundTool} sound prompt`, sceneIndex, asset)}
      </div>
      <label class="asset-field">
        <span>Notes</span>
        <textarea data-asset-field="notes" data-scene-index="${sceneIndex}" data-asset-id="${asset.id}">${escapeHtml(asset.notes)}</textarea>
      </label>
    </article>
  `;
}

function renderPromptField(field, label, sceneIndex, asset) {
  return `
    <label class="asset-field prompt-field">
      <span>${escapeHtml(label)}</span>
      <textarea data-asset-field="${field}" data-scene-index="${sceneIndex}" data-asset-id="${asset.id}">${escapeHtml(asset[field])}</textarea>
    </label>
  `;
}

            ? `<button class="button-secondary" data-action="generate-ideas">Generate Idea Cards</button>`
            : `<button class="button-secondary" data-action="generate-doc" data-doc="${nextGeneratableDoc(project)}">Generate Current Draft</button>`}
          <button class="button-secondary ${hasAccess("versions") ? "" : "is-locked"}" data-action="save-version" data-doc="${activeDoc(project)}" ${activeDoc(project) ? "" : "disabled"}>Save Active Version</button>
          <button class="button-secondary ${hasAccess("breakdowns") ? "" : "is-locked"}" data-action="generate-breakdowns">${hasAccess("breakdowns") ? "Refresh Breakdowns" : `Unlock Breakdowns - ${WEEKLY_PRICE}`}</button>

      </div>

      <div class="side-block">
        <h3>Notes</h3>
        <textarea class="note-area" data-project-field="notes">${escapeHtml(project.notes)}</textarea>
      </div>

      <div class="side-block">
        <h3>Version History</h3>
        <div class="tag-row">${versionItems || `<span class="muted">No saved versions yet</span>`}</div>
      </div>
    </aside>
  `;
}
