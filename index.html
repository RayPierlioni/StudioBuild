<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <meta http-equiv="refresh" content="0; url=https://miseforge.com/app" />
    <title>MiseForge</title>
    <script>
      window.location.replace("https://miseforge.com/app");
    </script>
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #141114;
        color: #fffaf2;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 20%, rgba(189, 88, 105, 0.28), transparent 32rem),
          linear-gradient(135deg, #171316 0%, #232025 48%, #101014 100%);
      }

      main {
        width: min(34rem, calc(100vw - 2rem));
        padding: 2rem;
        border: 1px solid rgba(255, 250, 242, 0.16);
        background: rgba(20, 17, 20, 0.72);
        box-shadow: 0 2rem 6rem rgba(0, 0, 0, 0.28);
      }

      p {
        margin: 0 0 1.25rem;
        color: rgba(255, 250, 242, 0.72);
        line-height: 1.6;
      }

      a {
        color: #fffaf2;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Opening MiseForge, the current production workspace.</p>
      <a href="https://miseforge.com/app">Open MiseForge</a>
    </main>
  </body>
</html>
