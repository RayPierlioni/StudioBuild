function stageLabel(stageId) {
  return stages.find((stage) => stage.id === stageId)?.label || "Idea";
}

function activeDoc(project) {
  return stages.find((stage) => stage.id === project.activeStage)?.doc || "";
}

function nextGeneratableDoc(project) {
  const active = activeDoc(project);
  if (active) {
    return active;
  }

  return "script";
}

function generateDoc(project, doc) {
  if (doc === "synopsis") {
    project.documents.synopsis = generateSynopsis(project);
  }

  if (doc === "treatment") {
    project.documents.treatment = generateTreatment(project);
  }

  if (doc === "story") {
    project.documents.story = generateShortStory(project);
  }

  if (doc === "script") {
    project.documents.script = generateScript(project);
  }
}

function advanceStage(project) {
  const currentIndex = stages.findIndex((stage) => stage.id === project.activeStage);
  const next = stages[currentIndex + 1];
  if (next && canOpenStage(project, next.id)) {
    project.activeStage = next.id;
  }
}

function saveVersion(project, doc) {
  if (!doc || !project.documents[doc]?.trim()) {
    showToast("Nothing to version yet.");
    return;
  }

  const existingCount = project.versions.filter((version) => version.doc === doc).length;
  const version = {
    id: makeId(),
    doc,
    number: existingCount + 1,
    savedAt: new Date().toISOString(),
    content: project.documents[doc],
  };

  project.versions.unshift(version);

  if (state.role === "free") {
    project.versions = project.versions
      .filter((item, index, all) => {
        const sameDocBefore = all.slice(0, index).filter((candidate) => candidate.doc === item.doc).length;
        return sameDocBefore < 3;
      });
  }

  showToast(`${doc} version saved.`);
}

function exportFountain(project) {
  if (!hasAccess("exports")) {
    openPaywall("exports");
    return;
  }

  const body = project.documents.script?.trim();
  if (!body) {
    showToast("Generate or write a script before exporting.");
    return;
  }

  const blob = new Blob([body], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = `${project.title.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "") || "studiobuild-script"}.fountain`;
  document.body.append(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
  showToast("Fountain export ready.");
}

function normalizeImportedScript(fileName, text) {
  if (fileName.toLowerCase().endsWith(".fdx")) {
    const document = new DOMParser().parseFromString(text, "application/xml");
    const paragraphs = Array.from(document.querySelectorAll("Paragraph"));
    const lines = paragraphs.map((paragraph) => {
      const type = paragraph.getAttribute("Type") || "";
      const content = Array.from(paragraph.querySelectorAll("Text"))
        .map((node) => node.textContent || "")
        .join("");

      if (["Scene Heading", "Character", "Transition"].includes(type)) {
        return content.toUpperCase();
      }

      return content;
    });

    return lines.filter(Boolean).join("\n\n");
  }

  return text.replace(/\r\n/g, "\n").trim();
}

function importScriptFile(project, file) {
  const reader = new FileReader();

  reader.addEventListener("load", () => {
    const text = normalizeImportedScript(file.name, String(reader.result || ""));
    if (!text.trim()) {
      showToast("That script did not contain readable text.");
      return;
    }

    updateActiveProject((item) => {
      item.documents.script = text;
      item.activeStage = "script";
      item.breakdowns = null;
      saveVersion(item, "script");
    });
    showToast("Script imported. Highlight any section to improve it.");
  });

  reader.readAsText(file);
}

function rewriteSelection(project, mode) {
  const editor = document.querySelector("#script-editor");
  if (!editor) {
    return;
  }

  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const selected = editor.value.slice(start, end).trim();

  if (!selected && mode !== "dialogue") {
    showToast("Highlight a section of the script first.");
    return;
  }

  const replacement = mode === "dialogue"
    ? writeDialoguePass(selected || editor.value.slice(Math.max(0, start - 300), start + 300), project)
    : improveScriptPass(selected, mode, project);

  const nextValue = mode === "dialogue" && start === end
    ? `${editor.value.slice(0, start)}${start > 0 ? "\n\n" : ""}${replacement}${editor.value.slice(end)}`
    : `${editor.value.slice(0, start)}${replacement}${editor.value.slice(end)}`;

  updateActiveProject((item) => {
    item.documents.script = nextValue;
    item.activeStage = "script";
  });

  showToast(mode === "dialogue" ? "Dialogue pass inserted." : "Highlighted section improved.");
}

function improveScriptPass(text, mode, project) {
  const inspiration = project.inspirations.slice(0, 3).join(", ") || "cinematic restraint";

  if (mode === "tighten") {
    return text
      .split("\n")
      .map((line) => line.trim())
      .filter(Boolean)
      .map((line) => {
        if (line.length < 42 || /^[A-Z0-9 .'-]+$/.test(line)) {
          return line;
        }

        return line.replace(/\b(really|very|just|actually|kind of|sort of)\b/gi, "").replace(/\s+/g, " ").trim();
      })
      .join("\n");
  }

  return text
    .split("\n")
    .map((line) => {
      const trimmed = line.trim();
      if (!trimmed) {
        return "";
      }

      if (/^(INT\.|EXT\.|FADE|CUT TO:|[A-Z][A-Z0-9 .'-]{1,28})$/.test(trimmed)) {
        return trimmed;
      }

      if (trimmed.length < 52) {
        return trimmed.replace(/\.$/, "") + ", the words carrying more than they admit.";
      }

      return `${trimmed} The moment is held with the quiet pressure of ${inspiration}, letting behavior reveal what no one can say cleanly.`;
    })
    .join("\n");
}

function writeDialoguePass(context, project) {
  const [lead = "MARA", partner = "JONAH"] = findScriptCharacters(project.documents.script);

  return `${lead}
We keep making the scene safer.

${partner}
Maybe safe is why it is not working.

${lead}
And if the honest version breaks the film?

${partner}
Then at least we know it was alive.`;
}

function findScriptCharacters(script) {
  const ignored = new Set(["FADE IN", "FADE OUT", "CUT TO", "INT", "EXT", "DAY", "NIGHT"]);
  const names = String(script || "")
    .split("\n")
    .map((line) => line.trim())
    .filter((line) => /^[A-Z][A-Z0-9 .'-]{1,24}$/.test(line))
    .filter((line) => !line.startsWith("INT.") && !line.startsWith("EXT."))
    .filter((line) => !ignored.has(line.replace(/:$/, "")));

  return [...new Set(names)].slice(0, 2);
}

function normalizeAssetOrder(sceneKit) {
  sceneKit.assets
    .sort((a, b) => a.order - b.order)
    .forEach((asset, index) => {
      asset.order = index + 1;
    });
}

function findAsset(sceneKit, assetId) {
  return sceneKit.assets.find((asset) => asset.id === assetId);
}

function moveAsset(sceneKit, assetId, direction) {
  normalizeAssetOrder(sceneKit);
  const index = sceneKit.assets.findIndex((asset) => asset.id === assetId);
  const nextIndex = direction === "up" ? index - 1 : index + 1;

  if (index < 0 || nextIndex < 0 || nextIndex >= sceneKit.assets.length) {
    return;
  }

  const currentOrder = sceneKit.assets[index].order;
  sceneKit.assets[index].order = sceneKit.assets[nextIndex].order;
  sceneKit.assets[nextIndex].order = currentOrder;
  normalizeAssetOrder(sceneKit);
}

function showToast(message) {
  clearTimeout(toastTimer);
  document.querySelector(".toast")?.remove();

  const toast = document.createElement("div");
  toast.className = "toast";
  toast.textContent = message;
  document.body.append(toast);

  toastTimer = setTimeout(() => toast.remove(), 3200);
}

function attachDialogHandlers() {
  const dialog = document.querySelector("#new-project-dialog");
  const form = document.querySelector("#new-project-form");

  form?.addEventListener("submit", (event) => {
    event.preventDefault();
    const formData = new FormData(form);
    const project = createProject(Object.fromEntries(formData.entries()));
    state.projects.unshift(project);
    state.activeProjectId = project.id;
    saveState();
    dialog?.close();
    render();
    showToast("Project created.");
  });
}

document.addEventListener("click", (event) => {
  const trigger = event.target.closest("[data-action]");
  if (!trigger) {
    return;
  }

  const action = trigger.dataset.action;
  const project = activeProject();

  if (action === "open-new-project") {
    document.querySelector("#new-project-dialog")?.showModal();
    return;
  }

  if (action === "close-dialog") {
    document.querySelector("#new-project-dialog")?.close();
    return;
  }

  if (action === "open-login") {
    document.querySelector("#login-dialog")?.showModal();
    return;
  }

  if (action === "close-login") {
    document.querySelector("#login-dialog")?.close();
    return;
  }

  if (action === "open-paywall") {
    openPaywall(trigger.dataset.feature || "full access");
    return;
  }

  if (action === "close-paywall") {
    document.querySelector("#paywall-dialog")?.close();
    return;
  }

  if (action === "subscribe-weekly") {
    state.subscription = {
      status: "active",
      plan: "studio-pass-weekly",
      price: WEEKLY_PRICE,
      startedAt: new Date().toISOString(),
    };
    state.role = "subscriber";
    saveState();
    document.querySelector("#paywall-dialog")?.close();
    render();
    showToast(`Studio Pass unlocked for ${WEEKLY_PRICE}.`);
    return;
  }

  if (action === "continue-google") {
    state.auth = {
      provider: "google",
      name: "Studiobuild Filmmaker",
      signedInAt: new Date().toISOString(),
    };
    saveState();
    currentView = "app";
    render();
    showToast("Signed in with Google.");
    return;
  }

  if (action === "enter-app") {
    currentView = "app";
    render();
    return;
  }

  if (action === "select-project") {
    state.activeProjectId = trigger.dataset.projectId;
    saveState();
    render();
    return;
  }

  if (!project) {
    return;
  }

  if (action === "set-stage") {
    setStage(trigger.dataset.stage);
    return;
  }

  if (action === "generate-ideas") {
    updateActiveProject((item) => {
      item.ideaCards = generateIdeaCards(item.ideaInput, item);
    });
    showToast("Three idea directions generated.");
    return;
  }

  if (action === "surprise-ideas") {
    updateActiveProject((item) => {
      item.ideaInput = "a filmmaker discovers the safest version of the story is the lie";
      item.ideaCards = generateIdeaCards(item.ideaInput, item);
    });
    showToast("Surprise directions generated.");
    return;
  }

  if (action === "select-idea") {
    updateActiveProject((item) => {
      const card = item.ideaCards.find((idea) => idea.id === trigger.dataset.ideaId);
      if (card) {
        item.documents.idea = card.premise;
        item.genre = card.genre;
        item.tone = card.tone;
        item.logline = card.premise.split(".")[0] + ".";
        item.activeStage = "synopsis";
      }
    });
    showToast("Idea selected.");
    return;
  }

  if (action === "generate-doc") {
    updateActiveProject((item) => {
      generateDoc(item, trigger.dataset.doc);
    });
    showToast(`${stageLabel(trigger.dataset.doc)} generated.`);
    return;
  }

  if (action === "open-script-import") {
    if (!requireAccess("scriptImport")) {
      return;
    }
    document.querySelector("#script-import-input")?.click();
    return;
  }

  if (action === "improve-selection") {
    if (!requireAccess("rewrites")) {
      return;
    }
    rewriteSelection(project, "improve");
    return;
  }

  if (action === "tighten-selection") {
    if (!requireAccess("rewrites")) {
      return;
    }
    rewriteSelection(project, "tighten");
    return;
  }

  if (action === "write-dialogue") {
    if (!requireAccess("rewrites")) {
      return;
    }
    rewriteSelection(project, "dialogue");
    return;
  }

  if (action === "save-version") {
    if (!requireAccess("versions")) {
      return;
    }
    updateActiveProject((item) => {
      saveVersion(item, trigger.dataset.doc);
    });
    return;
  }

  if (action === "advance-stage") {
    updateActiveProject(advanceStage);
    return;
  }

  if (action === "generate-breakdowns") {
    if (!requireAccess("breakdowns")) {
      return;
    }

    updateActiveProject((item) => {
      item.breakdowns = generateBreakdowns(item);
      item.activeStage = "breakdown";
    });
    showToast("Breakdowns refreshed.");
    return;
  }

  if (action === "add-insert-shot") {
    if (!requireAccess("productionKit")) {
      return;
    }
    updateActiveProject((item) => {
      item.breakdowns ||= generateBreakdowns(item);
      const sceneKit = item.breakdowns.aiProductionKit?.[Number(trigger.dataset.sceneIndex)];
      if (sceneKit) {
        sceneKit.assets.push(createInsertShotAsset(sceneKit, item));
        normalizeAssetOrder(sceneKit);
      }
    });
    showToast("New insert shot prompt added.");
    return;
  }

  if (action === "move-asset-up" || action === "move-asset-down") {
    updateActiveProject((item) => {
      const sceneKit = item.breakdowns?.aiProductionKit?.[Number(trigger.dataset.sceneIndex)];
      if (sceneKit) {
        moveAsset(sceneKit, trigger.dataset.assetId, action === "move-asset-up" ? "up" : "down");
      }
    });
    return;
  }

  if (action === "export-fountain") {
    exportFountain(project);
  }
});

document.addEventListener("input", (event) => {
  const target = event.target;
  const project = activeProject();
  if (!project) {
    return;
  }

  if (target.matches("[data-doc-type]")) {
    const doc = target.dataset.docType;
    project.documents[doc] = target.value;
    project.updatedAt = new Date().toISOString();
    scheduleSaveState();
  }

  if (target.matches("[data-field='ideaInput']")) {
    project.ideaInput = target.value;
    project.updatedAt = new Date().toISOString();
    scheduleSaveState();
  }

  if (target.matches("[data-project-field]")) {
    const field = target.dataset.projectField;
    if (field === "inspirations") {
      project.inspirations = parseCommaList(target.value);
    } else {
      project[field] = target.value;
    }
    project.updatedAt = new Date().toISOString();
    scheduleSaveState();
  }

  if (target.matches("[data-scene-field]")) {
    const sceneKit = project.breakdowns?.aiProductionKit?.[Number(target.dataset.sceneIndex)];
    if (sceneKit) {
      sceneKit[target.dataset.sceneField] = target.value;
      project.updatedAt = new Date().toISOString();
      scheduleSaveState();
    }
  }

  if (target.matches("[data-asset-field]")) {
    const sceneKit = project.breakdowns?.aiProductionKit?.[Number(target.dataset.sceneIndex)];
    const asset = sceneKit ? findAsset(sceneKit, target.dataset.assetId) : null;
    if (asset) {
      asset[target.dataset.assetField] = target.value;
      project.updatedAt = new Date().toISOString();
      scheduleSaveState();
    }
  }
});

document.addEventListener("change", (event) => {
  if (event.target.matches("[data-script-import]")) {
    const project = activeProject();
    const file = event.target.files?.[0];
    if (project && file) {
      importScriptFile(project, file);
    }
    event.target.value = "";
  }

  if (event.target.matches("[data-workflow-field]")) {
    const project = activeProject();
    if (!requireAccess("workflow")) {
      if (project) {
        event.target.value = project.workflow[event.target.dataset.workflowField];
      }
      return;
    }

    updateActiveProject((project) => {
      project.workflow[event.target.dataset.workflowField] = event.target.value;
      if (project.breakdowns) {
        project.breakdowns = generateBreakdowns(project);
      }
    });
    showToast("Workflow prompts regenerated for your toolchain.");
  }
});

window.addEventListener("beforeunload", flushScheduledSave);

render();
